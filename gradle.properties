# Allocate 3GB of heap space to the Gradle daemon to prevent OutOfMemory during R8/D8 dex merging
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Enable parallel builds and build caching for faster compilations
org.gradle.parallel=true
org.gradle.caching=true

# Enable AndroidX support
android.useAndroidX=true
